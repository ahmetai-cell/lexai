name: CD – Production Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: AWS kimlik bilgileri yapılandır
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: ECR login
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Backend image derle ve push et
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/lexai-backend:$IMAGE_TAG \
            -t $ECR_REGISTRY/lexai-backend:latest \
            ./backend
          docker push $ECR_REGISTRY/lexai-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/lexai-backend:latest

      - name: Frontend image derle ve push et
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/lexai-frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/lexai-frontend:latest \
            ./frontend
          docker push $ECR_REGISTRY/lexai-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/lexai-frontend:latest

      - name: Production sunucusuna SSH ile deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/lexai
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --no-deps backend frontend
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            docker system prune -f

      - name: Slack bildirim
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "LexAI Production Deploy: ${{ github.sha }} - ${{ job.status }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
