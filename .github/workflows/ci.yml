name: CI – Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: lexai_test
          POSTGRES_USER: lexai_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://lexai_user:testpassword@localhost:5432/lexai_test
      REDIS_URL: redis://localhost:6379/0
      APP_SECRET_KEY: test-secret-key-for-ci-only
      JWT_SECRET_KEY: test-jwt-secret-for-ci-only
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_BUCKET: test-bucket
      POSTGRES_USER: lexai_user
      POSTGRES_PASSWORD: testpassword

    steps:
      - uses: actions/checkout@v4

      - name: Python kurulum
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Bağımlılıkları yükle
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Ruff lint
        working-directory: backend
        run: ruff check app/

      - name: Unit testler
        working-directory: backend
        run: pytest tests/unit/ -v --cov=app --cov-report=xml

      - name: Integration testler
        working-directory: backend
        run: pytest tests/integration/ -v

      - name: Coverage upload
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml

  frontend-check:
    name: Frontend Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js kurulum
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Bağımlılıkları yükle
        working-directory: frontend
        run: npm ci

      - name: TypeScript kontrol
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend
        run: npm run lint

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check]

    steps:
      - uses: actions/checkout@v4

      - name: Backend image derle
        run: docker build -t lexai-backend:ci ./backend

      - name: Frontend image derle
        run: docker build -t lexai-frontend:ci ./frontend
