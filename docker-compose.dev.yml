version: "3.9"

networks:
  lexai-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lexai_dev
      POSTGRES_USER: lexai_user
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./infrastructure/postgres/pgvector_setup.sql:/docker-entrypoint-initdb.d/02_pgvector.sql
      - ./infrastructure/postgres/rls_setup.sql:/docker-entrypoint-initdb.d/03_rls.sql
    ports:
      - "5432:5432"
    networks:
      - lexai-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - lexai-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://lexai_user:devpassword@postgres:5432/lexai_dev
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - lexai-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - lexai-network
    command: sh -c "npm install && npm run dev"
